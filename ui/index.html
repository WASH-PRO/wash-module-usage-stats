<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usage Stats Collector</title>
  <link rel="stylesheet" href="wash-module-ui.css" />
</head>
<body class="wm-body">
  <div id="wm-app"></div>
  <script src="wash-module-sdk.js"></script>
  <script>
    WashModule.createPage({
      moduleId: 'usage-stats-collector',
      accent: '#7c3aed',
      refreshInterval: 15000,
      title: { ru: 'Сборщик загруженности', en: 'Usage stats collector' },
      subtitle: {
        ru: 'Агрегирует usage-stats CRM за выбранный период и сохраняет сводку в data/.',
        en: 'Aggregates CRM usage stats for the selected window and stores summary in data/.',
      },
      settingsHtml: `
        <div class="wm-field">
          <label class="wm-field-label" for="poll_interval">${WashModule.t({ ru: 'Интервал опроса (сек)', en: 'Poll interval (sec)' })}</label>
          <input class="wm-input" id="poll_interval" type="number" name="poll_interval" min="30" max="3600" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Частота сбора статистики из CRM.', en: 'How often to collect stats from CRM.' })}</span>
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="lookback_hours">${WashModule.t({ ru: 'Глубина выборки (часы)', en: 'Lookback (hours)' })}</label>
          <input class="wm-input" id="lookback_hours" type="number" name="lookback_hours" min="1" max="168" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Сколько часов истории учитывать в агрегате.', en: 'Hours of history included in the aggregate.' })}</span>
        </div>`,
      collectSettings(form) {
        return {
          poll_interval: Number(form.poll_interval.value),
          lookback_hours: Number(form.lookback_hours.value),
        };
      },
      applySettings(settings, form) {
        form.poll_interval.value = settings.poll_interval ?? 120;
        form.lookback_hours.value = settings.lookback_hours ?? 24;
      },
      metrics(snap) {
        if (!snap) return [];
        return [
          { label: WashModule.t({ ru: 'Моек', en: 'Washes' }), value: snap.washCount ?? 0, accent: true },
          { label: WashModule.t({ ru: 'Запусков', en: 'Launches' }), value: snap.totalLaunchCount ?? 0 },
          { label: WashModule.t({ ru: 'Секунд работы', en: 'Usage seconds' }), value: snap.totalUsageTimeSec ?? 0 },
          { label: WashModule.t({ ru: 'Строк CRM', en: 'CRM rows' }), value: snap.rowsConsidered ?? 0, hint: `${snap.lookbackHours || '—'}h` },
        ];
      },
      renderOverview(snap) {
        if (!snap) {
          return `<div class="wm-empty">${WashModule.escapeHtml(WashModule.t({ ru: 'Нет агрегата.', en: 'No aggregate yet.' }))}</div>`;
        }
        const byWash = snap.byWash && typeof snap.byWash === 'object' ? snap.byWash : {};
        const rows = Object.entries(byWash)
          .sort((a, b) => (b[1].launchCount || 0) - (a[1].launchCount || 0))
          .slice(0, 10)
          .map(([id, v]) =>
            `<li><span class="wm-kv"><span>${WashModule.escapeHtml(id)}</span><span>${WashModule.escapeHtml(String(v.launchCount || 0))} / ${WashModule.escapeHtml(String(v.usageTime || 0))}s</span></span></li>`
          )
          .join('');
        return `
          <h2 class="wm-section-title">${WashModule.t({ ru: 'Топ моек по запускам', en: 'Top washes by launches' })}</h2>
          ${rows ? `<ul class="wm-list">${rows}</ul>` : `<p class="wm-field-hint">${WashModule.t({ ru: 'Нет данных за период.', en: 'No data for the period.' })}</p>`}
          <h2 class="wm-section-title" style="margin-top:1rem">${WashModule.t({ ru: 'Полный агрегат', en: 'Full aggregate' })}</h2>
          <pre class="wm-code">${WashModule.escapeHtml(JSON.stringify(snap, null, 2))}</pre>`;
      },
    });
  </script>
</body>
</html>
